<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recuperar contraseña</title>
  <link rel="stylesheet" href="/static/css/form.css">
  <style>
    body { max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
    .auth-card { padding: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius); }
    .auth-card h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    .auth-card .muted { color: #64748b; margin-bottom: 1rem; font-size: 14px; }
    .auth-card .danger { color: #c00; margin-bottom: 1rem; font-size: 14px; }
    .auth-card .success { color: #15803d; margin-bottom: 1rem; font-size: 14px; }
    .auth-card label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 0.25rem; }
    .auth-card input { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border-radius: 12px; box-sizing: border-box; }
    .auth-footer { margin-top: 1.25rem; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>Recuperar contraseña</h1>
    <p class="muted">Indica tu correo y te enviaremos un enlace.</p>
    {% if sent %}
      <p class="success">Si ese correo está registrado, recibirás un enlace. Revisa también spam.</p>
    {% endif %}
    {% if error %}
      <p class="danger">{{ error }}</p>
    {% endif %}
    <form method="post" action="/forgot">
      <input type="hidden" name="csrf_token" value="{{ csrf_token or '' }}" />
      <label for="email">Correo electrónico</label>
      <input type="email" name="email" id="email" placeholder="tu@correo.com" required />
      <button type="submit" class="btn btn-primary">Enviar enlace</button>
    </form>
    <div class="auth-footer">
      <a href="/login">Volver a entrar</a>
    </div>
  </div>
</body>
</html>
