{% if has_fiel_validated and sat_sync_status is defined %}
{# P29: Sync sutil — solo botón de refresh. Al hacer clic muestra toast "sincronización en proceso" que se auto-dismiss #}
<div class="list-sync-bar list-sync-bar--sutil" id="listSyncBar" data-status="{{ sat_sync_status.status|default('ok') }}">
  <span class="list-sync-bar__chip" id="satSyncChip" aria-live="polite" hidden></span>
  <span class="list-sync-bar__meta muted" id="satSyncMeta" aria-hidden="true" hidden></span>
  <span class="list-sync-bar__status" id="satSyncStatus" data-status="{{ sat_sync_status.status|default('ok') }}" data-display="inline" aria-hidden="true" hidden></span>
  <button type="button" class="btn btn--sm btn--ghost list-sync-bar__btn" id="satSyncBtn" title="Sincronizar con SAT" aria-label="Sincronizar con SAT" data-loading-text="En proceso…">
    <svg class="icon list-sync-bar__btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 3v5h-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 21v-5h5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>
{% endif %}
