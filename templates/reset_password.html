<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nueva contraseña · ContaNeta</title>
  <link rel="stylesheet" href="/static/css/form.css">
  <style>
    body { max-width: 400px; margin: 2rem auto; padding: 0 1rem; }
    .auth-card { padding: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card-bg); box-shadow: var(--shadow); }
    .auth-card h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
    .auth-card .muted { margin-bottom: 1rem; font-size: 14px; }
    .auth-card .danger { color: #c00; margin-bottom: 1rem; font-size: 14px; }
    .auth-card label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 0.25rem; }
    .auth-card input { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border-radius: 12px; border: 1px solid var(--border-strong); box-sizing: border-box; }
    .auth-card button[type="submit"] { width: 100%; padding: 0.6rem; margin-top: 0.25rem; }
    .auth-footer { margin-top: 1.25rem; text-align: center; font-size: 14px; }
    .auth-footer a { color: var(--primary); }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1>Nueva contraseña</h1>
    <p class="muted">Elige una contraseña de al menos 8 caracteres.</p>
    {% if error %}
      <p class="danger">{{ error }}</p>
    {% endif %}
    <form method="post" action="/reset-password">
      <input type="hidden" name="csrf_token" value="{{ csrf_token or '' }}" />
      <input type="hidden" name="token" value="{{ token or '' }}" />
      <label for="password">Nueva contraseña</label>
      <input type="password" name="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required minlength="8" />
      <label for="password_confirm">Confirmar contraseña</label>
      <input type="password" name="password_confirm" id="password_confirm" placeholder="Repite la contraseña" autocomplete="new-password" required minlength="8" />
      <button type="submit" class="btn btn-primary">Guardar contraseña</button>
    </form>
    <div class="auth-footer">
      <a href="/login">Volver a entrar</a>
    </div>
  </div>
</body>
</html>
