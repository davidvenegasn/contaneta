   <script>
  // ============ Catalog helpers ============
  /** Debounce (ms) para búsquedas de catálogos prodserv/unidad: evita una petición por tecla. 250ms + AbortController para cancelar la anterior. */
  const DEBOUNCE_CATALOG_MS = 250;

  const portalFetch = (url, opts = {}, timeoutMs = 30000) =>
    typeof window.portalFetchWithTimeout === "function"
      ? window.portalFetchWithTimeout(url, opts, timeoutMs)
      : fetch(url, opts);

  const pick = (obj, keys) => {
    for (const k of keys) {
      if (obj && obj[k] !== undefined && obj[k] !== null && String(obj[k]).trim() !== "") {
        return String(obj[k]);
      }
    }
    return "";
  };

  const normalizeCatalogItem = (x) => {
    const code = pick(x, [
      "key",
      "clave",
      "id",
      "code",
      "c_Clave",
      "c_ClaveUnidad",
      "c_ClaveProdServ",
      "valor",
    ]);
    const desc = pick(x, ["label", "descripcion", "texto", "description", "nombre"]);
    return { code, desc };
  };

  const optionText = (code, desc) => (desc ? `${code} — ${desc}` : code);

  function renderSelect(selectEl, items, { defaultValue = "" } = {}) {
    selectEl.innerHTML = "";

    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "Selecciona…";
    selectEl.appendChild(opt0);

    for (const it of items) {
      if (!it.code) continue;
      const opt = document.createElement("option");
      opt.value = it.code;
      opt.textContent = optionText(it.code, it.desc);
      selectEl.appendChild(opt);
    }

    if (defaultValue) selectEl.value = defaultValue;
  }

  function renderSelectTop5(selectEl, items, { defaultValue = "", topCodes = [] } = {}) {
    const map = new Map(items.map((i) => [i.code, i]));
    const top = topCodes.map((c) => map.get(c)).filter(Boolean);
    const rest = items.filter((i) => i.code && !topCodes.includes(i.code));

    selectEl.innerHTML = "";

    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "Selecciona…";
    selectEl.appendChild(opt0);

    for (const it of top) {
      const opt = document.createElement("option");
      opt.value = it.code;
      opt.textContent = optionText(it.code, it.desc);
      selectEl.appendChild(opt);
    }

    const div = document.createElement("option");
    div.disabled = true;
    div.value = "__DIV__";
    div.textContent = "────────";
    selectEl.appendChild(div);

    const more = document.createElement("option");
    more.value = "__MORE__";
    more.textContent = "Mostrar más opciones…";
    selectEl.appendChild(more);

    if (defaultValue) selectEl.value = defaultValue;

    if (!selectEl.dataset.moreWired) {
      selectEl.dataset.moreWired = "1";
      selectEl.dataset.prevValue = defaultValue || "";

      selectEl.addEventListener("focus", () => {
        const v = selectEl.value;
        if (v && v !== "__MORE__" && v !== "__DIV__") selectEl.dataset.prevValue = v;
      });

      selectEl.addEventListener("change", () => {
        const v = selectEl.value;
        if (v === "__MORE__") {
          Array.from(selectEl.querySelectorAll('option[value="__DIV__"], option[value="__MORE__"]')).forEach(
            (o) => o.remove()
          );
          for (const it of rest) {
            const opt = document.createElement("option");
            opt.value = it.code;
            opt.textContent = optionText(it.code, it.desc);
            selectEl.appendChild(opt);
          }
          selectEl.value = selectEl.dataset.prevValue || defaultValue || "";
          return;
        }
        if (v && v !== "__DIV__") selectEl.dataset.prevValue = v;
      });
    }
  }

  async function loadSelect(url, selectEl, { defaultValue = "", topCodes = null } = {}) {
    try {
      const data =
        typeof window.portalCatalogGetJson === "function" && url.indexOf("/api/catalogs/") !== -1
          ? await window.portalCatalogGetJson(url)
          : await portalFetch(url, { credentials: "same-origin" }, 30000).then((r) =>
              r.ok ? r.json() : Promise.reject(new Error("HTTP " + r.status))
            );

      const normalized = [];
      for (const raw of data) {
        const { code, desc } = normalizeCatalogItem(raw);
        if (!code) continue;
        normalized.push({ code, desc });
      }

      if (Array.isArray(topCodes) && topCodes.length) {
        renderSelectTop5(selectEl, normalized, { defaultValue, topCodes });
      } else {
        renderSelect(selectEl, normalized, { defaultValue });
      }
    } catch (e) {
      selectEl.innerHTML = "";
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "No pudimos cargar";
      selectEl.appendChild(opt);
      console.error("Catalog load failed", url, e);
    }
  }

  // ============ Autocomplete helpers (datalist) ============
  function debounce(fn, ms = 250) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), ms);
    };
  }

  async function loadDatalist(url, datalistEl) {
    try {
      const data =
        typeof window.portalCatalogGetJson === "function" && url.indexOf("/api/catalogs/") !== -1
          ? await window.portalCatalogGetJson(url)
          : await portalFetch(url, { credentials: "same-origin" }, 30000).then((r) => (r.ok ? r.json() : null));
      if (!Array.isArray(data) && !data) return;
      datalistEl.innerHTML = "";
      const arr = Array.isArray(data) ? data : [];
      for (const raw of arr) {
        const { code, desc } = normalizeCatalogItem(raw);
        if (!code) continue;
        const opt = document.createElement("option");
        opt.value = desc ? `${code} — ${desc}` : code;
        datalistEl.appendChild(opt);
      }
    } catch (e) {
      console.error("Datalist load failed", url, e);
    }
  }

  function wireAutocomplete(selector, endpoint, listPrefix) {
    document.querySelectorAll(selector).forEach((input) => {
      if (input.dataset.autowire === "1") return;
      input.dataset.autowire = "1";

      const i = input.getAttribute("data-i");
      const list = document.getElementById(`${listPrefix}_${i}`);
      if (!list) return;

      const run = debounce(async () => {
        const q = (input.value || "").trim();
        if (q.length < 2) {
          list.innerHTML = "";
          return;
        }
        await loadDatalist(`${endpoint}?q=${encodeURIComponent(q)}`, list);
      }, DEBOUNCE_CATALOG_MS);

      input.addEventListener("input", run);
    });
  }

  // ============ ProdServ Modal Search =========
  let _prodservActiveI = null;

  function openProdservModal(i) {
    _prodservActiveI = String(i);
    const modal = document.getElementById("prodservModal");
    const input = document.getElementById("prodservModalInput");
    const results = document.getElementById("prodservModalResults");
    if (!modal || !input || !results) return;

    results.innerHTML = '<div class="muted">Escribe para buscar…</div>';
    input.value = "";
    modal.style.display = "block";
    setTimeout(() => input.focus(), 0);
  }

  function closeProdservModal() {
    const modal = document.getElementById("prodservModal");
    if (modal) modal.style.display = "none";
    _prodservActiveI = null;
  }

  let _prodservAbort = null;
  async function searchProdserv(q) {
    const results = document.getElementById("prodservModalResults");
    if (!results) return;
    const term = (q || "").trim();
    if (term.length < 2) {
      results.innerHTML = '<div class="muted">Escribe al menos 2 letras…</div>';
      return;
    }

    if (_prodservAbort) _prodservAbort.abort();
    _prodservAbort = new AbortController();
    const signal = _prodservAbort.signal;
    results.innerHTML = '<div class="muted">Buscando…</div>';

    try {
      const data =
        typeof window.portalCatalogGetJson === "function"
          ? await window.portalCatalogGetJson(`/api/catalogs/prodserv?q=${encodeURIComponent(term)}`, { signal })
          : await portalFetch(
              `/api/catalogs/prodserv?q=${encodeURIComponent(term)}`,
              { signal, credentials: "same-origin" },
              30000
            ).then((r) => (r.ok ? r.json() : Promise.reject(new Error("HTTP " + r.status))));

      const items = [];
      for (const raw of data) {
        const { code, desc } = normalizeCatalogItem(raw);
        if (!code) continue;
        items.push({ code, desc });
      }

      if (!items.length) {
        results.innerHTML = '<div class="muted">Sin resultados.</div>';
        return;
      }

      results.innerHTML = "";
      for (const it of items.slice(0, 50)) {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "result-row";
        row.innerHTML = `<div class="result-code">${it.code}</div><div class="result-desc">${it.desc || ""}</div>`;
        row.addEventListener("click", () => {
          if (!_prodservActiveI) return;
          const target = document.querySelector(`input[name="key_${_prodservActiveI}"]`);
          if (target) {
            target.value = it.desc ? `${it.code} — ${it.desc}` : it.code;
            target.dispatchEvent(new Event("input", { bubbles: true }));
            target.dispatchEvent(new Event("change", { bubbles: true }));
          }
          closeProdservModal();
        });
        results.appendChild(row);
      }
    } catch (e) {
      if (e.name === "AbortError") return;
      console.error("ProdServ modal search failed", e);
      results.innerHTML = '<div class="muted">No se pudo buscar. Revisa el servidor.</div>';
    } finally {
      if (_prodservAbort && _prodservAbort.signal === signal) _prodservAbort = null;
    }
  }

  function wireProdservModal() {
    const modal = document.getElementById("prodservModal");
    const input = document.getElementById("prodservModalInput");
    if (!modal || !input) return;

    modal.addEventListener("click", (e) => {
      const t = e.target;
      if (t && t.getAttribute && t.getAttribute("data-close") === "1") closeProdservModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.style.display === "block") closeProdservModal();
    });

    input.addEventListener("input", debounce(() => searchProdserv(input.value), DEBOUNCE_CATALOG_MS));

    document.addEventListener("click", (e) => {
      const btn = e.target && e.target.closest ? e.target.closest(".prodservBtn") : null;
      if (!btn) return;
      const i = btn.getAttribute("data-i");
      if (!i) return;
      openProdservModal(i);
    });
  }

  // ============ RFC -> PM inference ============
  function inferIsPMFromRFC(rfc) {
    const s = (rfc || "").trim().toUpperCase();
    if (!s) return null;
    if (s === "XAXX010101000" || s === "XEXX010101000") return null;
    if (/^[A-Z&Ñ]{4}\d{6}[A-Z0-9]{3}$/.test(s)) return false; // PF
    if (/^[A-Z&Ñ]{3}\d{6}[A-Z0-9]{3}$/.test(s)) return true; // PM
    return null;
  }

  // ============ Money / numbers ============
  const parseNum = (v) => {
    if (v === null || v === undefined) return 0;
    const s = String(v).replace(/,/g, "").trim();
    const n = Number(s);
    return Number.isFinite(n) ? n : 0;
  };

  // ============ Global taxes wiring ============
  function isIssuerRESICO() {
    const v = (document.getElementById("issuer_tax_system")?.value || "").trim();
    return v === "626" || v.toUpperCase().includes("RESICO");
  }

  function getReceiverIsPM() {
    return document.getElementById("receiver_is_pm")?.checked === true;
  }

  function getUnitKey(i) {
    return (document.getElementById(`unit_${i}`)?.value || "").trim().toUpperCase();
  }

  function hasAnyServiceUnitE48() {
    const rows = Array.from(document.querySelectorAll(".item-row[data-item-row]"));
    return rows.some((r) => {
      const i = r.getAttribute("data-item-row");
      return (getUnitKey(i) || "") === "E48";
    });
  }

  function getGlobals() {
    const gIva = document.getElementById("global_iva");
    const gIsr = document.getElementById("global_isr_ret");
    const gIvaRet = document.getElementById("global_iva_ret");
    return {
      gIva,
      gIsr,
      gIvaRet,
      iva: parseNum(gIva?.value),
      isr: parseNum(gIsr?.value),
      ivaRet: parseNum(gIvaRet?.value),
    };
  }

  function suggestedIvaRetRateFromIva(ivaRate) {
    // usamos tasa efectiva sobre base (lineNet), para que calcTotals sea simple
    if (Math.abs(ivaRate - 0.16) < 0.0001) return 0.1066666667; // 2/3 de 16% = 10.66666667%
    if (Math.abs(ivaRate - 0.08) < 0.0001) return 0.0533333333; // 2/3 de 8%  = 5.33333333%
    return 0;
  }

  function applyGlobalSuggestionsIfAllowed() {
    const { gIva, gIsr, gIvaRet } = getGlobals();
    if (!gIva || !gIsr || !gIvaRet) return;

    const issuerResico = isIssuerRESICO();
    const receiverPM = getReceiverIsPM();
    const anyService = hasAnyServiceUnitE48();

    // Si no aplica, sugerimos 0 (solo si no están manual)
    const shouldSuggest = issuerResico && receiverPM && anyService;

    if (gIsr.dataset.manual !== "1") {
      gIsr.value = shouldSuggest ? "0.0125" : "0";
    }

    if (gIvaRet.dataset.manual !== "1") {
      const ivaRate = parseNum(gIva.value);
      const sug = shouldSuggest ? suggestedIvaRetRateFromIva(ivaRate) : 0;
      gIvaRet.value = String(sug);
    }
  }

  function syncHiddenTaxesFromGlobals() {
    const { iva, isr, ivaRet } = getGlobals();

    const rows = Array.from(document.querySelectorAll(".item-row[data-item-row]"));
    for (const row of rows) {
      const i = row.getAttribute("data-item-row");
      const hidIva = document.querySelector(`input[name="iva_${i}"]`);
      const hidIsr = document.querySelector(`input[name="isr_ret_${i}"]`);
      const hidIvaRet = document.querySelector(`input[name="iva_ret_${i}"]`);

      if (hidIva) hidIva.value = String(iva || 0);
      if (hidIsr) hidIsr.value = String(isr || 0);
      if (hidIvaRet) hidIvaRet.value = String(ivaRet || 0);
    }
  }

  function onTaxContextChanged() {
    applyGlobalSuggestionsIfAllowed();
    syncHiddenTaxesFromGlobals();
    calcTotals();
  }

  function wireGlobalTaxes() {
    const { gIva, gIsr, gIvaRet } = getGlobals();
    if (!gIva || !gIsr || !gIvaRet) return;

    if (!gIva.dataset.wired) {
      gIva.dataset.wired = "1";
      gIva.addEventListener("change", () => {
        // si cambia IVA, y ret iva no está manual, re-sugerimos su tasa
        onTaxContextChanged();
      });
    }

    if (!gIsr.dataset.wired) {
      gIsr.dataset.wired = "1";
      gIsr.addEventListener("change", () => {
        gIsr.dataset.manual = "1";
        onTaxContextChanged();
      });
    }

    if (!gIvaRet.dataset.wired) {
      gIvaRet.dataset.wired = "1";
      gIvaRet.addEventListener("change", () => {
        gIvaRet.dataset.manual = "1";
        onTaxContextChanged();
      });
    }
  }

  // ============ Unit UI (common + more) ============
  function extractUnitKey(val) {
    if (!val) return "";
    const s = String(val).trim();
    const beforeDash = s.split("—")[0].split("-")[0].trim();
    return beforeDash.split(" ")[0].trim();
  }

  function wireUnitRow(i) {
    const selU = document.getElementById(`unit_select_${i}`);
    const hidU = document.getElementById(`unit_${i}`);
    const othU = document.getElementById(`unit_other_${i}`);
    const backU = document.getElementById(`unit_back_${i}`);
    if (!selU || !hidU || !othU || !backU) return;
    if (selU.dataset.unitWired === "1") return;
    selU.dataset.unitWired = "1";

    const showOther = () => {
      selU.style.display = "none";
      othU.style.display = "block";
      backU.style.display = "inline";
      othU.value = "";
      hidU.value = "";
      othU.focus();
      onTaxContextChanged();
    };

    const showCommon = () => {
      selU.style.display = "block";
      othU.style.display = "none";
      backU.style.display = "none";
      if (!selU.value || selU.value === "__MORE__") selU.value = "E48";
      hidU.value = selU.value;
      onTaxContextChanged();
    };

    if (!selU.value) selU.value = "E48";
    hidU.value = selU.value;

    selU.addEventListener("change", () => {
      if (selU.value === "__MORE__") {
        showOther();
      } else {
        hidU.value = selU.value;
        onTaxContextChanged();
      }
    });

    backU.addEventListener("click", (e) => {
      e.preventDefault();
      showCommon();
    });

    othU.addEventListener("input", () => {
      hidU.value = extractUnitKey(othU.value);
    });
    othU.addEventListener("change", () => {
      hidU.value = extractUnitKey(othU.value);
      onTaxContextChanged();
    });
  }

  function wireUnitUI() {
    const rows = Array.from(document.querySelectorAll(".item-row[data-item-row]"));
    for (const row of rows) {
      const i = row.getAttribute("data-item-row");
      wireUnitRow(i);
    }
  }

  // ============ Totals preview ============
  let selMon = null;

  function calcTotals() {
    let subtotal = 0;
    let discountAmt = 0;
    let ivaAmt = 0;
    let isrRetAmt = 0;
    let ivaRetAmt = 0;

    const allRows = Array.from(document.querySelectorAll(".item-row[data-item-row]"));
    for (const row of allRows) {
      const i = row.getAttribute("data-item-row");

      const qty = parseNum(document.querySelector(`input[name="qty_${i}"]`)?.value);
      const price = parseNum(document.querySelector(`input[name="price_${i}"]`)?.value);
      const discPct = parseNum(document.querySelector(`input[name="disc_${i}"]`)?.value);

      // ahora impuestos por fila SOLO hidden
      const ivaRate = parseNum(document.querySelector(`input[name="iva_${i}"]`)?.value);
      const isrRetRate = parseNum(document.querySelector(`input[name="isr_ret_${i}"]`)?.value);
      const ivaRetRate = parseNum(document.querySelector(`input[name="iva_ret_${i}"]`)?.value);

      if (qty <= 0 || price <= 0) continue;

      const lineBase = qty * price;
      const lineDisc = (Math.max(0, Math.min(100, discPct)) / 100) * lineBase;
      const lineNet = lineBase - lineDisc;

      subtotal += lineBase;
      discountAmt += lineDisc;
      ivaAmt += lineNet * ivaRate;

      if (isrRetRate > 0) isrRetAmt += lineNet * isrRetRate;
      if (ivaRetRate > 0) ivaRetAmt += lineNet * ivaRetRate;
    }

    const total = subtotal - discountAmt + ivaAmt;
    const totalPayable = total - isrRetAmt - ivaRetAmt;

    const cur = (selMon?.value || "MXN").toUpperCase();
    const fmt = (n) => {
      const x = Number(n || 0);
      try {
        return x.toLocaleString("es-MX", {
          style: "currency",
          currency: cur === "USD" ? "USD" : "MXN",
        });
      } catch {
        return x.toLocaleString("es-MX", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
    };

    const subEl = document.getElementById("subtotal_preview");
    const disEl = document.getElementById("discount_preview");
    const ivaEl = document.getElementById("iva_preview");
    const totEl = document.getElementById("total_preview");
    const isrRetEl = document.getElementById("isr_ret_preview");
    const ivaRetEl = document.getElementById("iva_ret_preview");
    const payEl = document.getElementById("total_payable_preview");

    if (subEl) subEl.value = fmt(subtotal);
    if (disEl) disEl.value = fmt(discountAmt);
    if (ivaEl) ivaEl.value = fmt(ivaAmt);
    if (totEl) totEl.value = fmt(total);
    if (isrRetEl) isrRetEl.value = fmt(isrRetAmt);
    if (ivaRetEl) ivaRetEl.value = fmt(ivaRetAmt);
    if (payEl) payEl.value = fmt(totalPayable);

    const actionTotal = document.getElementById("action_total_text");
    if (actionTotal) actionTotal.textContent = fmt(totalPayable);
  }

  function wireTotalsInputs() {
    const rows = Array.from(document.querySelectorAll(".item-row[data-item-row]"));
    for (const row of rows) {
      const i = row.getAttribute("data-item-row");
      [
        document.querySelector(`input[name="qty_${i}"]`),
        document.querySelector(`input[name="price_${i}"]`),
        document.querySelector(`input[name="disc_${i}"]`),
        document.querySelector(`input[name="iva_${i}"]`),
        document.querySelector(`input[name="isr_ret_${i}"]`),
        document.querySelector(`input[name="iva_ret_${i}"]`),
      ].forEach((el) => {
        if (!el) return;
        if (el.dataset.totWired === "1") return;
        el.dataset.totWired = "1";
        el.addEventListener("input", calcTotals);
        el.addEventListener("change", calcTotals);
      });
    }
  }

  // ============ Items UI: add/remove/renumber ============
  function initItemsUI() {
    const itemsContainer = document.querySelector(".items");
    const counter = document.getElementById("itemsCounter");
    const addBtn = document.getElementById("addItemBtn");
    const templateRow = document.querySelector('.item-row[data-item-row="1"]');
    if (!itemsContainer || !counter || !addBtn || !templateRow) return;

    const rows = () => Array.from(document.querySelectorAll(".item-row[data-item-row]"));

    const updateCounter = () => {
      const n = rows().length;
      counter.textContent = n === 1 ? "1 concepto" : `${n} conceptos`;
    };

    const renumberRow = (row, idx) => {
      row.setAttribute("data-item-row", String(idx));

      row.querySelectorAll("[name]").forEach((el) => {
        const n = el.getAttribute("name");
        if (/_\d+$/.test(n)) el.setAttribute("name", n.replace(/_\d+$/, `_${idx}`));
      });

      row.querySelectorAll("[id]").forEach((el) => {
        const id = el.getAttribute("id");
        if (/_(\d+)$/.test(id)) el.setAttribute("id", id.replace(/_\d+$/, `_${idx}`));
      });

      row.querySelectorAll("[data-i]").forEach((el) => el.setAttribute("data-i", String(idx)));

      const prod = row.querySelector("input.prodserv");
      if (prod) prod.setAttribute("list", `prodserv_list_${idx}`);
      const prodList = row.querySelector('datalist[id^="prodserv_list_"]');
      if (prodList) prodList.id = `prodserv_list_${idx}`;

      const unitOther = row.querySelector("input.unitOther");
      if (unitOther) unitOther.setAttribute("list", `unidad_list_${idx}`);
      const unitList = row.querySelector('datalist[id^="unidad_list_"]');
      if (unitList) unitList.id = `unidad_list_${idx}`;

      const unitSel = row.querySelector('select[id^="unit_select_"]');
      if (unitSel) delete unitSel.dataset.unitWired;

      const rm = row.querySelector("button.removeItemBtn");
      if (rm) rm.style.visibility = idx === 1 ? "hidden" : "visible";
    };

    const clearRow = (row) => {
      row.querySelectorAll("input").forEach((inp) => {
        const t = (inp.getAttribute("type") || "").toLowerCase();
        if (t === "hidden") {
          if ((inp.name || "").startsWith("unit_")) inp.value = "E48";
          return;
        }
        inp.value = "";
      });

      const unitSel = row.querySelector("select.unitCommon");
      if (unitSel) unitSel.value = "E48";
      const unitHidden = row.querySelector('input[type="hidden"][name^="unit_"]');
      if (unitHidden) unitHidden.value = "E48";

      const unitOther = row.querySelector("input.unitOther");
      const unitBack = row.querySelector("a.unit-back");
      if (unitOther) {
        unitOther.style.display = "none";
        unitOther.value = "";
      }
      if (unitBack) unitBack.style.display = "none";
      if (unitSel) unitSel.style.display = "block";

      // IMPORTANT: impuestos se rellenan desde globales al final
    };

    const wireRemove = (row) => {
      const rm = row.querySelector("button.removeItemBtn");
      if (!rm || rm.dataset.rmWired === "1") return;
      rm.dataset.rmWired = "1";

      rm.addEventListener("click", () => {
        const idx = Number(row.getAttribute("data-item-row") || 0);
        if (idx === 1) {
          clearRow(row);
        } else {
          row.remove();
        }

        rows().forEach((r, j) => {
          renumberRow(r, j + 1);
          wireRemove(r);
        });

        wireAutocomplete("input.prodserv", "/api/catalogs/prodserv", "prodserv_list");
        wireAutocomplete("input.unitOther", "/api/catalogs/unidad", "unidad_list");
        wireUnitUI();
        wireTotalsInputs();

        onTaxContextChanged();
        updateCounter();
      });
    };

    renumberRow(templateRow, 1);
    wireRemove(templateRow);
    updateCounter();

    addBtn.addEventListener("click", () => {
      const idx = rows().length + 1;
      const clone = templateRow.cloneNode(true);

      clearRow(clone);

      clone.querySelectorAll("[data-autowire]").forEach((el) => delete el.dataset.autowire);
      clone.querySelectorAll("[data-tot-wired]").forEach((el) => delete el.dataset.totWired);
      clone.querySelectorAll("[data-rm-wired]").forEach((el) => delete el.dataset.rmWired);

      renumberRow(clone, idx);
      clone.classList.add("anim-in");
      itemsContainer.appendChild(clone);
      wireRemove(clone);

      wireAutocomplete("input.prodserv", "/api/catalogs/prodserv", "prodserv_list");
      wireAutocomplete("input.unitOther", "/api/catalogs/unidad", "unidad_list");
      wireUnitUI();
      wireTotalsInputs();

      onTaxContextChanged();
      updateCounter();
    });
  }

  // ============ Boot ============
  (async function boot() {
    // Prefill primer concepto desde URL (ej. desde listado de productos)
    const firstUnitWrap = document.querySelector(".unit-wrap[data-prefill-unit]");
    if (firstUnitWrap) {
      const unitKey = (firstUnitWrap.getAttribute("data-prefill-unit") || "E48").trim();
      const sel = firstUnitWrap.querySelector("select.unitCommon");
      const hid = firstUnitWrap.querySelector('input[name^="unit_"]');
      if (sel) sel.value = unitKey;
      if (hid) hid.value = unitKey;
    }

    // selects
    const selReg = document.getElementById("customer_tax_system");
    const selUso = document.getElementById("cfdi_use");
    selMon = document.getElementById("currency");
    const selMet = document.getElementById("payment_method");
    const selFor = document.getElementById("payment_form");

    if (selReg) {
      const regPrefill = (selReg.getAttribute("data-prefill") || "").trim();
      await loadSelect("/api/catalogs/regimen_fiscal", selReg, { defaultValue: regPrefill });
    }

    if (selUso)
      await loadSelect("/api/catalogs/uso_cfdi", selUso, {
        defaultValue: "G03",
        topCodes: ["G03", "G01", "I01", "I02", "P01"],
      });

    if (selMon)
      await loadSelect("/api/catalogs/moneda", selMon, {
        defaultValue: "MXN",
        topCodes: ["MXN", "USD"],
      });

    if (selMet) await loadSelect("/api/catalogs/metodo_pago", selMet, { defaultValue: "PUE" });

    if (selFor)
      await loadSelect("/api/catalogs/forma_pago", selFor, {
        defaultValue: "03",
        topCodes: ["03", "28", "04", "01", "99"],
      });

    // defaults & toggles
    const ex = document.getElementById("exchange_rate");
    const syncExchangeRate = () => {
      if (!selMon || !ex) return;
      const cur = (selMon.value || "").toUpperCase();
      const isUSD = cur === "USD";
      ex.disabled = !isUSD;
      ex.required = isUSD;
      if (!isUSD) ex.value = "";
    };
    syncExchangeRate();
    if (selMon) selMon.addEventListener("change", syncExchangeRate);

    const syncPaymentForm = () => {
      if (!selMet || !selFor) return;
      const method = (selMet.value || "").toUpperCase();
      if (method === "PPD") {
        selFor.value = "99";
        return;
      }
      if (method === "PUE") {
        const current = (selFor.value || "").toUpperCase();
        if (!current || current === "99") selFor.value = "03";
      }
    };
    syncPaymentForm();
    if (selMet) selMet.addEventListener("change", syncPaymentForm);

    // save customer alias
    const saveChk = document.getElementById("save_customer");
    const aliasIn = document.getElementById("customer_alias");
    const syncAlias = () => {
      if (!saveChk || !aliasIn) return;
      aliasIn.disabled = !saveChk.checked;
      if (!saveChk.checked) aliasIn.value = "";
    };
    if (saveChk) {
      saveChk.addEventListener("change", syncAlias);
      syncAlias();
    }

    // RFC -> PM auto check
    const rfcIn = document.querySelector('input[name="customer_rfc"]');
    const pmChk = document.getElementById("receiver_is_pm");
    if (rfcIn && pmChk) {
      rfcIn.addEventListener("blur", () => {
        const inf = inferIsPMFromRFC(rfcIn.value);
        if (inf === null) return;
        pmChk.checked = inf;
        onTaxContextChanged();
      });

      pmChk.addEventListener("change", () => {
        onTaxContextChanged();
      });
    }

    // wire global taxes
    wireGlobalTaxes();

    // wire concepts
    initItemsUI();

    // wire autocomplete
    wireAutocomplete("input.prodserv", "/api/catalogs/prodserv", "prodserv_list");
    wireAutocomplete("input.unitOther", "/api/catalogs/unidad", "unidad_list");

    // per-row wiring
    wireUnitUI();
    wireTotalsInputs();

    // modal
    wireProdservModal();

    // initial sync
    onTaxContextChanged();

    calcTotals();
  })();
</script>
