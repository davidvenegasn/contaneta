<div class="card">
  <div class="app-content">
    <div class="card-title-row mb-14"><h3 class="section-title">01 — Cliente <span class="tip" data-tip="Estos son los datos de la persona o empresa a quien le facturas.">?</span></h3></div>

    <div class="row">
      <div><label>RFC (cliente) <span class="tip" data-tip="RFC del cliente. Debe coincidir con su constancia de situación fiscal.">?</span></label><input name="customer_rfc" required placeholder="XAXX010101000" value="{{ customer_prefill.customer_rfc | e if customer_prefill else '' }}" /></div>
      <div><label>Razón social <span class="tip" data-tip="Nombre EXACTO como aparece en SAT.">?</span></label><input name="customer_legal_name" required placeholder="Nombre / Razón social" value="{{ customer_prefill.customer_legal_name | e if customer_prefill else '' }}" /></div>
    </div>

    <div class="row">
      <div class="checkline">
        <input type="checkbox" id="receiver_is_pm" name="receiver_is_pm" value="1" />
        <label for="receiver_is_pm" class="checkline__label checkline__label--bold">Cliente es Persona Moral</label>
        <span class="muted checkline__hint">(se detecta por RFC, puedes corregirlo)</span>
      </div>
      <div>
        <input type="hidden" id="issuer_tax_system" value="{{ issuer_tax_system | default('') }}" />
      </div>
    </div>

    <div class="row">
      <div><label>Código postal <span class="tip" data-tip="CP del domicilio fiscal del cliente (el de su constancia SAT).">?</span></label><input name="customer_zip" required placeholder="64000" value="{{ customer_prefill.customer_zip | e if customer_prefill else '' }}" /></div>
      <div>
        <label>Régimen fiscal <span class="tip" data-tip="Régimen del cliente. Si no lo sabes, lo trae su constancia SAT.">?</span></label>
        <select name="customer_tax_system" id="customer_tax_system" required data-prefill="{{ customer_prefill.customer_tax_system | e if customer_prefill else '' }}">
          <option value="">Cargando…</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div>
        <label>¿Para qué usará tu cliente esta factura? <span class="tip tip--left" data-tip="Para qué usa el cliente esta factura. Generalmente se usa G03 – Gastos en general.">?</span></label>
        <select name="cfdi_use" id="cfdi_use" required>
          <option value="">Cargando…</option>
        </select>
      </div>
      <div><label>Email</label><input name="customer_email" placeholder="mail@ejemplo.com" value="{{ customer_prefill.customer_email | e if customer_prefill else '' }}" /></div>
    </div>

    <div class="row">
      <div class="checkline">
        <input type="checkbox" id="save_customer" name="save_customer" value="1" />
        <label for="save_customer" class="checkline__label">Guardar cliente frecuente</label>
      </div>
      <div>
        <label>Alias del cliente (opcional)</label>
        <input name="customer_alias" id="customer_alias" placeholder="Ej. Cliente ACME / Juan nómina" disabled />
        <p class="muted mt-6">Se guardará para este emisor y podrás seleccionarlo en futuras facturas.</p>
      </div>
    </div>
  </div>
</div>
