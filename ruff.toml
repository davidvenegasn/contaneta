# Ruff linting configuration for ContaNeta
# See: https://docs.astral.sh/ruff/configuration/

target-version = "py311"
line-length = 120

exclude = [
    ".venv",
    "__pycache__",
    "migrations",
    "sat_sync",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line length — handled by formatter
    "B008",  # function call in default argument — required by FastAPI Depends() pattern
    "B904",  # raise from — too noisy for this codebase
]

[lint.isort]
known-first-party = ["services", "routers", "database", "config", "migrations_runner"]
