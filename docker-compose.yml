version: "3.9"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENV=dev
      - DEV_MODE=1
      - APP_DB_PATH=/data/invoicing.db
    volumes:
      - db-data:/data
      - ./storage:/app/storage
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "worker.py", "--loop"]
    env_file: .env
    environment:
      - ENV=dev
      - DEV_MODE=1
      - APP_DB_PATH=/data/invoicing.db
    volumes:
      - db-data:/data
      - ./storage:/app/storage
    restart: unless-stopped
    depends_on:
      - web

volumes:
  db-data:
